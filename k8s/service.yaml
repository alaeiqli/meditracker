apiVersion: v1
kind: Service
metadata:
  name: meditracker-service
  namespace: default  # Ajoutez le namespace si nécessaire
  labels:
    app: meditracker  # Important pour le ServiceMonitor
spec:
  type: NodePort
  selector:
    app: meditracker
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      name: web  # Ajoutez un NOM au port (important pour ServiceMonitor)